# Repository-level config consumed by Resource Translator
# (https://ievangelist.github.io/resource-translator/configuration).
#
# Action inputs always win over the values declared here.

sourceLocale: en

# Limit translation to the docs i18n sources. Adding new files to this
# repo (e.g. demo .resx fixtures) won't be picked up unless they live
# under the docs i18n source tree.
include:
  - docs/src/content/i18n/**/*.en.json

# Generated locales — every language Azure AI Translator currently
# supports as a translation target. Keep in sync with
# docs/src/data/azure-locales.json.
