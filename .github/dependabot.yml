version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    # The @actions/* packages went ESM-only at the versions below.
    # The action is bundled as CommonJS for the Node 24 runner, so we
    # stay on the last CJS major until a future ESM migration. See
    # CHANGELOG.md "Path A pin decision".
    ignore:
      - dependency-name: "@actions/core"
        versions: [">=3.0.0"]
      - dependency-name: "@actions/github"
        versions: [">=9.0.0"]
      - dependency-name: "@actions/glob"
        versions: [">=0.6.0"]
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-deps:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
      - docs
    groups:
      docs-deps:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        update-types:
          - minor
          - patch

