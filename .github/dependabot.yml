version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-deps:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
      - docs
    groups:
      docs-deps:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        update-types:
          - minor
          - patch
